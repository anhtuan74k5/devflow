spring:
  application:
    name: devflow

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:devflow}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

springdoc:
  swagger-ui:
    disable-swagger-default-url: true
  packages-to-scan: com.example.devflow.controller

jwt:
  secret: ${JWT_SECRET:devflow-secret-key-must-be-at-least-256-bits-long-for-hs256}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}
