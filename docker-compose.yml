services:
  postgres-db:
    image: postgres:15-alpine
    container_name: devflow-postgres
    ports:
      - "${DB_PORT-5432}:5432"
    environment:
      POSTGRES_USER: ${DB_USERNAME-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD-123}
      POSTGRES_DB: ${DB_NAME-devflow}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - devflow-network

  app:
    build: .
    container_name: devflow-app
    ports:
      - "8080:8080"
    depends_on:
      - postgres-db
    environment:
      DB_HOST: postgres-db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-devflow}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-123}
      JWT_SECRET: ${JWT_SECRET:-devflow-secret-key-must-be-at-least-256-bits-long-for-hs256}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
    restart: on-failure
    networks:
      - devflow-network

volumes:
  pgdata:

networks:
  devflow-network:
    driver: bridge
