services:
  postgres-db:
    image: postgres:15-alpine
    container_name: devflow-postgres
    ports:
      - "${DB_PORT-5432}:5432"
    environment:
      POSTGRES_USER: ${DB_USERNAME-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD-123}
      POSTGRES_DB: ${DB_NAME-devflow}
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: